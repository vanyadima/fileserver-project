<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель — Редактор фильтров</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="filters">
  <script src="/config.js"></script>
  <div class="app-shell admin-shell">
    <aside class="sidebar">
      <div>
        <h1>Админ-панель</h1>
        <p class="muted">Фильтры, теги, загрузка и удаление файлов.</p>
      </div>
      <nav class="nav-list">
        <a class="nav-link active" data-page="filters" href="/index.html">Редактор фильтров</a>
        <a class="nav-link " data-page="upload" href="/upload.html">Загрузка файлов</a>
        <a class="nav-link " data-page="files" href="/files.html">Удаление файлов</a>
      </nav>
      <div class="sidebar-card">
        <div class="auth-box">
          <div id="authStatus" class="status warning">Не авторизован</div>
          <input id="passwordInput" type="password" placeholder="Пароль администратора" />
          <button id="loginBtn" class="primary">Войти</button>
          <button id="logoutBtn" class="secondary hidden">Выйти</button>
        </div>
      </div>
    </aside>
    <main class="content">
      <header class="page-header">
        <div>
          <h2 id="pageTitle">Редактор фильтров</h2>
          <p id="pageHint" class="muted">Здесь редактируются теги и фильтры, которые потом увидит главная страница.</p>
        </div>
        <button id="reloadBtn" class="secondary">Обновить</button>
      </header>
      
<section class="grid-2">
  <div class="card">
    <h3>Теги</h3>
    <div id="tagsList" class="chips"></div>
    <div class="row">
      <input id="newTagInput" type="text" placeholder="Новый тег" />
      <button id="addTagBtn" class="secondary">Добавить</button>
    </div>
    <div class="row right">
      <button id="saveTagsBtn" class="primary">Применить теги</button>
    </div>
  </div>
  <div class="card">
    <h3>Фильтры</h3>
    <div id="filtersList"></div>
    <div class="row">
      <button id="addFilterBtn" class="secondary">Добавить фильтр</button>
      <button id="saveFiltersBtn" class="primary">Применить фильтры</button>
    </div>
    <p class="muted small">Тип dropdown — список, тип checkbox — галочка.</p>
  </div>
</section>

    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
