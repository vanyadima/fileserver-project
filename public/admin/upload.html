<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель — Загрузка файлов</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="upload">
  <script src="/config.js"></script>
  <div class="app-shell admin-shell">
    <aside class="sidebar">
      <div>
        <h1>Админ-панель</h1>
        <p class="muted">Фильтры, теги, загрузка и удаление файлов.</p>
      </div>
      <nav class="nav-list">
        <a class="nav-link " data-page="filters" href="/index.html">Редактор фильтров</a>
        <a class="nav-link active" data-page="upload" href="/upload.html">Загрузка файлов</a>
        <a class="nav-link " data-page="files" href="/files.html">Удаление файлов</a>
      </nav>
      <div class="sidebar-card">
        <div class="auth-box">
          <div id="authStatus" class="status warning">Не авторизован</div>
          <input id="passwordInput" type="password" placeholder="Пароль администратора" />
          <button id="loginBtn" class="primary">Войти</button>
          <button id="logoutBtn" class="secondary hidden">Выйти</button>
        </div>
      </div>
    </aside>
    <main class="content">
      <header class="page-header">
        <div>
          <h2 id="pageTitle">Загрузка файлов</h2>
          <p id="pageHint" class="muted">Здесь можно загрузить несколько файлов сразу и назначить им теги и фильтры.</p>
        </div>
        <button id="reloadBtn" class="secondary">Обновить</button>
      </header>
      
<section class="card">
  <h3>Загрузить несколько файлов</h3>
  <div class="grid-2">
    <div>
      <label>Папка</label>
      <input id="uploadFolder" type="text" placeholder="например: docs/2026" />
    </div>
    <div>
      <label>Файлы</label>
      <input id="uploadFiles" type="file" multiple />
    </div>
  </div>

  <div class="split">
    <div>
      <h4>Теги для этих файлов</h4>
      <div id="uploadTags" class="chips"></div>
    </div>
    <div>
      <h4>Значения фильтров</h4>
      <div id="uploadFilters"></div>
    </div>
  </div>

  <div class="row right">
    <button id="uploadBtn" class="primary">Применить и загрузить</button>
  </div>
</section>

    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
